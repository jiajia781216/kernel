# Description: Compile mainline stable kernel with custom config
# Copyright (C) 2021 https://github.com/unifreq/openwrt_packit
# Copyright (C) 2021 https://github.com/ophub/kernel
#==========================================================================

name: Compile mainline stable kernel

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      kernel_source:
        description: "Select the kernel source"
        required: false
        default: "unifreq"
        type: choice
        options:
          - unifreq
          - ophub
      kernel_version:
        description: "Select kernel version"
        required: false
        default: "6.18.y"
        type: choice
        options:
          - all
          - 5.10.y
          - 5.15.y
          - 6.1.y
          - 6.6.y
          - 6.12.y
          - 6.18.y
      kernel_auto:
        description: "Auto use the latest kernel"
        required: false
        default: true
        type: boolean
      delete_source:
        description: "Delete source after compilation"
        required: false
        default: true
        type: boolean
      kernel_package:
        description: "Select compile package list"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - dtbs
      kernel_toolchain:
        description: "Select the compilation toolchain"
        required: false
        default: "gcc"
        type: choice
        options:
          - clang
          - gcc
          - gcc-15.2
          - gcc-14.3
          - gcc-14.2
      ccache_clear:
        description: "Set whether to clear the cache"
        required: false
        default: false
        type: boolean
      docker_image:
        description: "Select Armbian docker image"
        required: false
        default: "bookworm"
        type: choice
        options:
          - trixie
          - bookworm
          - resolute
          - noble
      kernel_sign:
        description: "Set the kernel custom signature"
        required: false
        default: "-woloong"
        type: choice
        options:
          - -ophub
          - -happy-new-year
          - -dragon-boat-festival
          - -mid-autumn-festival
          - -happy-national-day
          - -merry-christmas
          - -spring-plowing
          - -summer-growing
          - -autumn-harvesting
          - -winter-storing
          - -woloong

env:
  TZ: Etc/UTC

permissions:
  contents: write
  actions: read

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set build matrix based on kernel_version input
        id: set-matrix
        run: |
          if [[ "${{ inputs.kernel_version }}" == "all" ]]; then
            MATRIX='{"include":[{"kernel_version":"5.10.y"},{"kernel_version":"5.15.y"},{"kernel_version":"6.1.y"},{"kernel_version":"6.6.y"},{"kernel_version":"6.12.y"},{"kernel_version":"6.18.y"}]}'
          else
            MATRIX='{"include":[{"kernel_version":"${{ inputs.kernel_version }}"}]}'
          fi
          echo "matrix=${MATRIX}" >> "${GITHUB_OUTPUT}"

  build:
    needs: setup
    runs-on: ubuntu-24.04-arm
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}
    
    permissions:
      contents: write
      packages: write

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    name: compile-kernel-${{ matrix.kernel_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # 根据内核版本自动匹配配置文件路径
      - name: Auto-match kernel config path
        id: match-config
        run: |
          KERNEL_VER="${{ matrix.kernel_version }}"
          CONFIG_VERSION="${KERNEL_VER%.y}"
          CONFIG_PATH="kernel-config/release/stable/config-${CONFIG_VERSION}"
          
          echo "Kernel version: ${KERNEL_VER}"
          echo "Config version: ${CONFIG_VERSION}"
          echo "Config path: ${CONFIG_PATH}"
          
          if [[ -f "${CONFIG_PATH}" ]]; then
            echo "Config file found: ${CONFIG_PATH}"
            echo "config_path=${CONFIG_PATH}" >> $GITHUB_OUTPUT
            echo "config_version=${CONFIG_VERSION}" >> $GITHUB_OUTPUT
            echo "status=found" >> $GITHUB_OUTPUT
            
            # 显示关键配置用于调试
            echo "=== Custom config CAN settings ==="
            grep "CONFIG_CAN_" "${CONFIG_PATH}" || echo "  (no CAN configs found)"
            echo "==================================="
          else
            echo "Error: Config file not found at ${CONFIG_PATH}"
            echo "status=not_found" >> $GITHUB_OUTPUT
            exit 1
          fi

      # ========== 关键修复：强制覆盖 Action 的默认配置文件 ==========
      - name: Force override default kernel config in Action
        id: override-config
        run: |
          echo "=== Force overriding kernel config ==="
          
          MY_CONFIG="${{ steps.match-config.outputs.config_path }}"
          CONFIG_VER="${{ steps.match-config.outputs.config_version }}"
          
          echo "Custom config: ${MY_CONFIG}"
          echo "Config version: ${CONFIG_VER}"
          
          # 验证自定义配置文件内容
          if [[ ! -f "${MY_CONFIG}" ]]; then
            echo "ERROR: Custom config not found!"
            exit 1
          fi
          
          # 创建临时目录，存放我们要覆盖的配置文件
          mkdir -p /tmp/kernel_config_override
          cp "${MY_CONFIG}" "/tmp/kernel_config_override/config-${CONFIG_VER}"
          
          # 也保存一份为 config-${CONFIG_VER}.y (带 .y 后缀的版本)
          cp "${MY_CONFIG}" "/tmp/kernel_config_override/config-${CONFIG_VER}.y"
          
          echo "Custom config copied to /tmp/kernel_config_override/"
          
          # 创建一个脚本，在 Action 运行期间持续覆盖配置文件
          # 这个脚本会在后台运行，监控 Action 的配置文件目录
          cat > /tmp/monitor_and_override.sh << 'MONITOR_SCRIPT'
          #!/bin/bash
          
          SOURCE_DIR="/tmp/kernel_config_override"
          TARGET_PATTERNS=(
            "/builder/*/compile-kernel/tools/config"
            "/builder/*/tools/config"
            "/home/runner/work/*/amlogic-s9xxx-armbian/*/compile-kernel/tools/config"
            "/home/runner/work/_actions/*/amlogic-s9xxx-armbian/*/compile-kernel/tools/config"
          )
          
          echo "Starting config override monitor..."
          
          # 持续监控 10 分钟
          for i in {1..120}; do
            for pattern in "${TARGET_PATTERNS[@]}"; do
              for target_dir in $(ls -d ${pattern} 2>/dev/null || true); do
                if [[ -d "${target_dir}" ]]; then
                  CONFIG_VER="${{ steps.match-config.outputs.config_version }}"
                  if [[ -f "${SOURCE_DIR}/config-${CONFIG_VER}" ]]; then
                    cp "${SOURCE_DIR}/config-${CONFIG_VER}" "${target_dir}/config-${CONFIG_VER}"
                    cp "${SOURCE_DIR}/config-${CONFIG_VER}" "${target_dir}/config-${CONFIG_VER}.y"
                    echo "[$(date)] Overridden: ${target_dir}/config-${CONFIG_VER}"
                  fi
                fi
              done
            done
            sleep 5
          done
          MONITOR_SCRIPT
          
          chmod +x /tmp/monitor_and_override.sh
          /tmp/monitor_and_override.sh &
          MONITOR_PID=$!
          echo "MONITOR_PID=${MONITOR_PID}" >> $GITHUB_ENV
          
          echo "=== Force override setup complete ==="

      - name: Initialize the build environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi -f $(docker images -q) 2>/dev/null || true
          [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
          sudo swapoff -a
          sudo rm -f /swapfile /mnt/swapfile
          sudo -E apt-get -y update
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y install $(curl -fsSL https://ophub.org/ubuntu2404-build-armbian-depends)
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
          sudo rm -rf ~/{.cargo,.dotnet,.rustup}
          sudo -E timedatectl set-timezone "${TZ:-Etc/UTC}"
          sudo -E ntpdate ntp.ubuntu.com 0.pool.ntp.org || true
          sudo -E timedatectl set-ntp true
          date -u
          timedatectl status || true
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Create virtual disk for extended storage
        id: disk
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo truncate -s "${root_size}"G /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6
          sudo pvcreate /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs -f -i sparse=0 -b size=4096 /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner:runner /builder
          df -Th
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Get kernel source commit hash
        id: kernelhash
        run: |
          api_url="https://api.github.com/repos/${{ inputs.kernel_source }}/linux-${{ matrix.kernel_version }}/git/ref/heads/main"
          source_hash=$(curl -fsSL -m 20 \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              ${api_url} |
              jq -r '.object.sha'
          )
          [[ -z "${source_hash}" || "${source_hash}" == "null" ]] && source_hash="${{ github.sha }}"
          echo "source_hash=${source_hash}" >> ${GITHUB_ENV}
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: /builder/ccache
          key: kernel-mainline-${{ inputs.kernel_toolchain }}-${{ matrix.kernel_version }}-${{ env.source_hash }}
          restore-keys: |
            kernel-mainline-${{ inputs.kernel_toolchain }}-${{ matrix.kernel_version }}-

      # 编译前再次确保配置文件已被覆盖
      - name: Pre-compile config verification
        run: |
          echo "=== Pre-compile config verification ==="
          CONFIG_VER="${{ steps.match-config.outputs.config_version }}"
          
          # 查找并显示将要使用的配置文件
          find /home/runner/work -name "config-${CONFIG_VER}" 2>/dev/null | while read cfg; do
            echo "Found config at: ${cfg}"
            echo "CAN_GS_USB setting:"
            grep "CONFIG_CAN_GS_USB" "${cfg}" || echo "  NOT SET"
          done
          
          echo "======================================"

      - name: Compile the kernel [ ${{ matrix.kernel_version }} ]
        uses: ophub/amlogic-s9xxx-armbian@main
        if: ${{ steps.disk.outputs.status == 'success' && !cancelled() }}
        with:
          build_target: kernel
          kernel_source: ${{ inputs.kernel_source }}
          kernel_version: ${{ matrix.kernel_version }}
          kernel_auto: ${{ inputs.kernel_auto }}
          delete_source: ${{ inputs.delete_source }}
          kernel_package: ${{ inputs.kernel_package }}
          kernel_toolchain: ${{ inputs.kernel_toolchain }}
          kernel_sign: ${{ inputs.kernel_sign }}
          kernel_config: ${{ steps.match-config.outputs.config_path }}
          ccache_clear: ${{ inputs.ccache_clear }}
          docker_hostpath: /builder
          docker_image: ophub/armbian-${{ inputs.docker_image }}:arm64

      # 编译后验证
      - name: Post-compile config verification
        if: ${{ always() }}
        run: |
          echo "=== Post-compile config verification ==="
          
          # 查找编译出的内核配置文件
          for config_file in /builder/*/boot/config-* /builder/*/config-*; do
            if [[ -f "${config_file}" ]]; then
              echo "Checking: ${config_file}"
              if grep -q "CONFIG_CAN_GS_USB=y" "${config_file}" 2>/dev/null; then
                echo "✅ SUCCESS: CONFIG_CAN_GS_USB=y found in ${config_file}"
              elif grep -q "# CONFIG_CAN_GS_USB is not set" "${config_file}" 2>/dev/null; then
                echo "❌ FAILED: CONFIG_CAN_GS_USB is not set in ${config_file}"
              fi
            fi
          done
          
          echo "======================================"

      - name: Upload Kernel to Release
        uses: ophub/upload-to-releases@main
        if: ${{ env.PACKAGED_STATUS == 'success' && !cancelled() }}
        with:
          tag: kernel_stable
          artifacts: ${{ env.PACKAGED_OUTPUTPATH }}/*
          allow_updates: true
          remove_artifacts: false
          replaces_artifacts: true
          make_latest: true
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            - These are Mainline `stable` kernels compiled with **CUSTOM CONFIG**.
            - Kernel Source: ${{ inputs.kernel_source }}/linux-${{ matrix.kernel_version }}
            - Custom Config: ${{ steps.match-config.outputs.config_path }}
            - Toolchain: ${{ inputs.kernel_toolchain }}
            
            **CAN Configuration Status:**
            - CONFIG_CAN=y
            - CONFIG_CAN_DEV=y
            - CONFIG_CAN_GS_USB=y
            
            <br />
            
            - 这些是使用**自定义配置**编译的主线稳定内核。
            - 内核源码: ${{ inputs.kernel_source }}/linux-${{ matrix.kernel_version }}
            - 配置文件: ${{ steps.match-config.outputs.config_path }}
